<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aluguer de Bicicletas</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        header { background: #4CAF50; color: white; padding: 10px; font-size: 24px; }
        section { padding: 20px; }
        .bike { border: 1px solid #ddd; padding: 15px; margin: 10px; display: inline-block; }
        form { margin-top: 20px; }
    </style>
</head>
<body>
    <header>Aluguer de Bicicletas</header>
    <section>
        <h2>Nossas Bicicletas</h2>
        <div class="bike">
            <h3>Mountain Bike</h3>
            <p>Preço: 15€/dia</p>
        </div>
        <div class="bike">
            <h3>Bicicleta Urbana</h3>
            <p>Preço: 10€/dia</p>
        </div>
    </section>
    <section>
        <h2>Reserve a sua bicicleta</h2>
        <form>
            <label>Nome:</label>
            <input type="text" required><br>
            <label>Email:</label>
            <input type="email" required><br>
            <label>Bicicleta:</label>
            <select>
                <option>Mountain Bike</option>
                <option>Bicicleta Urbana</option>
            </select><br>
            <button type="submit">Reservar</button>
        </form>
    </section>
</body>
</html>
